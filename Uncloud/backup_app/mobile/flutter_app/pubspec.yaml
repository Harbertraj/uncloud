name: uncloud_backup
description: Unlimited backup app - Photos, videos, files, apps to Telegram Saved Messages
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Telegram TDLib - uncomment after: flutter pub add tdlib
  # tdlib: ^1.6.0
  
  # File operations
  file_picker: ^8.0.0
  path_provider: ^2.1.1
  path: ^1.8.3
  mime: ^1.0.4
  
  # Compression & encryption
  archive: ^3.4.9
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  
  # Local storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  
  # State & routing
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  
  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0088CC"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
